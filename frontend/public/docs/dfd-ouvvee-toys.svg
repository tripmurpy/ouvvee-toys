<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1700" viewBox="0 0 2200 1700" role="img" aria-labelledby="title desc">
  <title id="title">DFD Ouvvee Toys E-Commerce</title>
  <desc id="desc">Data Flow Diagram Level 0 dan Level 1 untuk sistem e-commerce Ouvvee Toys.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .title { font: 700 42px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 19px Arial, sans-serif; fill: #475569; }
      .section { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 15px Arial, sans-serif; fill: #475569; }
      .flow { font: 700 14px Arial, sans-serif; fill: #1d4ed8; }
      .note { font: 400 14px Arial, sans-serif; fill: #64748b; }
      .entity { fill: #ffffff; stroke: #0f172a; stroke-width: 2.2; rx: 8; filter: url(#shadow); }
      .process { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2.4; rx: 24; filter: url(#shadow); }
      .system { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; rx: 28; filter: url(#shadow); }
      .store { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 3; filter: url(#shadow); }
      .store-divider { stroke: #ea580c; stroke-width: 2; }
      .line { fill: none; stroke: #2563eb; stroke-width: 2.2; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #2563eb; stroke-width: 1.8; marker-end: url(#arrow); }
      .muted { fill: none; stroke: #64748b; stroke-width: 1.7; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
    </style>
  </defs>

  <rect class="bg" width="2200" height="1700"/>

