<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ouvvee Toys GLB Preview</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer@4.3.1/dist/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #f8f9fa;
            color: #191c1f;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        main {
            width: min(1080px, calc(100% - 32px));
            margin: 32px auto;
            display: grid;
            gap: 18px;
        }

        model-viewer {
            width: 100%;
            height: min(72vh, 620px);
            border: 1px solid #e1e4ea;
            border-radius: 16px;
            background: linear-gradient(145deg, #fff, #eef0ff);
        }

        select {
            width: min(100%, 320px);
            padding: 10px 12px;
            border: 1px solid #e1e4ea;
            border-radius: 10px;
            background: #fff;
            font: inherit;
        }
    </style>
</head>
<body>
    <main>
        <select id="model">
            <option value="/models/products/robot_police.glb">Robot Police</option>
            <option value="/models/products/bulldozer.glb">Bulldozer</option>
            <option value="/models/products/dragonborn.glb">Dragonborn</option>
            <option value="/models/products/elephant.glb">Elephant</option>
            <option value="/models/products/excavator.glb">Excavator</option>
            <option value="/models/products/house.glb">House</option>
            <option value="/models/products/robot_arm.glb">Robot Arm</option>
            <option value="/models/products/robot_crab.glb">Robot Crab</option>
            <option value="/models/products/ship.glb">Ship</option>
        </select>
        <model-viewer
            id="viewer"
            src="/models/products/robot_police.glb"
            alt="Model 3D mainan Ouvvee Toys"
            camera-controls
            auto-rotate
            shadow-intensity="1"
        ></model-viewer>
    </main>
    <script>
        document.getElementById('model').addEventListener('change', (event) => {
            document.getElementById('viewer').src = event.target.value;
        });
    </script>
</body>
</html>
